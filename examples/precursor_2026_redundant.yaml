# Redundancy-hardened precursor batch: every component that appears in a
# capability_unlocks rule flies at qty >= 2, balanced-packed with anti-affinity,
# so the loss of ANY single ship on EDL costs zero capabilities.
#
# The price of loss-tolerance is real but affordable at window-0 utilisation:
# roughly +78 t of hardware plus the larger power plant it demands. The bonus
# is that redundant ISRU hardware is not dead mass — a second chain DOUBLES
# nameplate propellant production (redundancy = capacity for process plants).
# Items already redundant by quantity (excavators, rovers, robots) are unchanged.
id: precursor_2026_redundant
window: "2026-11"
objective: "Robotic precursor batch — loss-of-any-one-ship tolerant"
crewed: false
ships: 5
packing_policy: balanced
pack_spares: true

manifest:
  # comms / nav / autonomy — duplicated (unlock rules: comms_established,
  # precision_landing, autonomy_proven)
  - {id: relay_ground_station, qty: 2}
  - {id: landing_beacons, qty: 2}
  - {id: central_compute, qty: 2}
  - {id: robotic_maint_kit, qty: 2}
  - {id: recon_instruments, qty: 1}          # science, not gate-critical
  # robotics & infrastructure — crane duplicated (infrastructure_ready)
  - {id: optimus_robot, qty: 10}
  - {id: rover_unpressurized, qty: 2}
  - {id: cargo_crane, qty: 2}
  - {id: power_distribution, qty: 2}
  - {id: logistics_kit, qty: 2}
  - {id: thermal_control, qty: 1}
  - {id: dust_mitigation, qty: 1}
  # ISRU chain — duplicated (return_propellant_proven); doubles production
  - {id: co2_acquisition, qty: 2}
  - {id: sabatier_reactor, qty: 2}
  - {id: water_electrolysis, qty: 2}
  - {id: cryo_liquefaction, qty: 2}
  - {id: isru_control, qty: 2}
  # water mining — prospecting/processing duplicated (water_supply)
  - {id: ice_prospecting, qty: 2}
  - {id: excavator_rassor, qty: 2}
  - {id: water_processing, qty: 2}
  # habitat & life support — duplicated (habitat_ready, life_support_closed,
  # radiation_managed)
  - {id: habitat_module, qty: 2}
  - {id: eclss_habitat, qty: 2}
  - {id: radiation_shelter, qty: 2}
  - {id: consumables_cache, qty: 2}
  # site prep — kept single (gates covered elsewhere; second wave scales this)
  - {id: sintering_rig, qty: 1}
  - {id: grading_tools, qty: 1}
