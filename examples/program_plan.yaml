    synod_index: 6
    transit_days: 210
    objective: "Settlement established: 1,000+ adults (NSS milestone)"
    missions:
      - id: settlement_2044
        objective: "600 settlers; the 1,000-adult formal-settlement milestone"
        crewed: true
