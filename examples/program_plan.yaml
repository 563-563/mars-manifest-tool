          - {id: polymer_chemical_plant, qty: 1}
          - {id: water_electrolysis, qty: 4}
          - {id: excavator_rassor, qty: 4}
          - {id: water_processing, qty: 2}
          - {id: sintering_rig, qty: 4}
          - {id: radiation_shelter, qty: 4}
