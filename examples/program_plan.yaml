# PROGRAM PLAN — the working baseline campaign.
#
# Window 0 is the loss-tolerant redundant fleet (every unlock-critical
# component at qty >= 2). Windows 1-2 fly the rate-matched fuel-factory buy
# from IsruEngine.size_chain (one return load per synod needs 6x electrolysis /
# 2x CO2 / 3x Sabatier / 2x cryo at ~1,050 kW): window 1 delivers the full
# matched chain (window-0 hardware becomes the redundancy margin), window 2
# duplicates the plant (plant-level redundancy = 2x production) and builds the
# habitat cluster. Window 3 is first crew, gated on capabilities and on
# propellant actually banked.
#
# All waves use balanced packing with spares as explicit cargo.
# (examples/campaign_4window.yaml is retained as a regression fixture only.)
id: program_plan

windows:
  - id: "2031-01"
    synod_index: 0
    transit_days: 210
    objective: "Loss-tolerant precursor: prove EDL, power, pilot ISRU, ECLSS testbed"
    missions:
      - id: precursor_2031_program
        objective: >-
          Redundant on schedule-critical capabilities (power, ISRU, water,
          comms, autonomy, infrastructure). Crew-era hardware deferred per
          lifecycle review EXCEPT one habitat+ECLSS set, flown early as the
          1000-sol life-support demonstration article. Caches and shelters
          wait for window 2 (shelf life; passive hardware needs no demo).
        crewed: false
        ships: 5
        packing_policy: balanced
        pack_spares: true
        manifest:
          - {id: relay_ground_station, qty: 2}
          - {id: landing_beacons, qty: 2}
          - {id: central_compute, qty: 2}
          - {id: robotic_maint_kit, qty: 2}
          - {id: recon_instruments, qty: 1}
          - {id: optimus_robot, qty: 10}
          - {id: rover_unpressurized, qty: 2}
          - {id: cargo_crane, qty: 2}
          - {id: power_distribution, qty: 2}
          - {id: logistics_kit, qty: 2}
          - {id: thermal_control, qty: 1}
          - {id: dust_mitigation, qty: 1}
          - {id: co2_acquisition, qty: 2}
          - {id: sabatier_reactor, qty: 2}
          - {id: water_electrolysis, qty: 2}
          - {id: cryo_liquefaction, qty: 2}
          - {id: isru_control, qty: 2}
          - {id: ice_prospecting, qty: 2}
          - {id: excavator_rassor, qty: 2}
          - {id: water_processing, qty: 2}
          - {id: sintering_rig, qty: 1}
          - {id: grading_tools, qty: 1}
          # demonstration articles (demo-exempt in the lifecycle review)
          - {id: habitat_module, qty: 1}
          - {id: eclss_habitat, qty: 1}
          # prospecting-first (Handmer): penetrators released on approach +
          # orbital radar/relay constellation -> fast alternative path to
          # water_confirmed (~30 sols vs 200 for surface drilling alone)
          - {id: kinetic_penetrator_set, qty: 1}
          - {id: orbital_radar_set, qty: 1}

  - id: "2033-03"
    synod_index: 1
    transit_days: 210
    objective: "Fuel factory: full rate-matched ISRU chain + the reactors it drags"
    missions:
      - id: fuel_factory_2033
        objective: "Deliver the size_chain() matched buy; window-0 chain becomes hot spare"
        crewed: false
        # prospect-before-commit (Handmer): the factory buy is gated on site
        # water actually confirmed by window-0 prospecting (~18-month margin
        # between data return and this fleet's ship date)
        requires: [water_confirmed]
        # C4 loss-tolerance review: the program's critical-path window already
        # MEETS the single-fault standard without hardening -- (1) capability:
        # return_propellant_proven/water_supply are backstopped by window-0's
        # pre-deployed pilot chain (L1-LOG-02 PASSES here); (2) production:
        # ~1,826 t banked vs the 1,400 t gate is 30% margin, and one lost ship
        # removes only ~20% (-> ~1,525 t, still clears). A 6th ship was
        # considered and rejected as gold-plating (docs/CONSIDERED.md). The
        # residual TWO-ship-loss cliff (-> ~1,224 t) is C2's target.
        ships: 5
        packing_policy: balanced
        pack_spares: true
        manifest:
          # rate-matched chain (one return load per synod)
          - {id: water_electrolysis, qty: 6}
          - {id: co2_acquisition, qty: 2}
          - {id: sabatier_reactor, qty: 2}
          - {id: cryo_liquefaction, qty: 2}
          - {id: water_processing, qty: 1}
          - {id: isru_control, qty: 1}
          - {id: excavator_rassor, qty: 4}
          # site & fleet support
          - {id: optimus_robot, qty: 10}
          - {id: rover_unpressurized, qty: 2}
          - {id: robotic_maint_kit, qty: 2}
          - {id: cargo_crane, qty: 1}
          - {id: thermal_control, qty: 2}
          - {id: dust_mitigation, qty: 2}
          - {id: power_distribution, qty: 2}
          - {id: logistics_kit, qty: 1}

  - id: "2035-05"
    synod_index: 2
    transit_days: 210
    objective: "Second plant (2x production) + habitat cluster + deep caches"
    missions:
      - id: buildout_2035
        objective: "Duplicate the fuel factory; stage the crewed-era base"
        crewed: false
        # 11 ships: at the verified 614 m3 bay this window is volume-bound
        # (habitat cluster + caches), not mass-bound
        ships: 11
        packing_policy: balanced
        pack_spares: true
        manifest:
          # second matched chain -> plant-level redundancy AND 2x rate
          - {id: water_electrolysis, qty: 6}
          - {id: co2_acquisition, qty: 2}
          - {id: sabatier_reactor, qty: 2}
          - {id: cryo_liquefaction, qty: 2}
          - {id: water_processing, qty: 1}
          - {id: isru_control, qty: 1}
          - {id: excavator_rassor, qty: 4}
          # habitat cluster + life support + caches
          - {id: habitat_module, qty: 4}
          - {id: eclss_habitat, qty: 4}
          - {id: radiation_shelter, qty: 2}
          - {id: consumables_cache, qty: 6}
          - {id: sintering_rig, qty: 2}
          - {id: grading_tools, qty: 1}
          # fleet growth + comms depth
          - {id: optimus_robot, qty: 30}
          - {id: rover_unpressurized, qty: 4}
          - {id: robotic_maint_kit, qty: 4}
          - {id: cargo_crane, qty: 2}
          - {id: thermal_control, qty: 4}
          - {id: dust_mitigation, qty: 2}
          - {id: power_distribution, qty: 2}
          - {id: logistics_kit, qty: 2}
          - {id: relay_ground_station, qty: 1}
          - {id: central_compute, qty: 1}
          - {id: landing_beacons, qty: 1}

  - id: "2037-07"
    synod_index: 3
    transit_days: 210
    objective: "First crew — arrives to a powered, provisioned, fueled base"
    missions:
      - id: first_crew_2037
        objective: "Crew + consumable depth + habitat growth"
        crewed: true
        # first crew size: within the 10-20 range of the New Space 2022
        # architecture and matching the DLR/Maiwald 12-crew consumables case
        settlers: 12
        ships: 21
        packing_policy: balanced
        pack_spares: true
        manifest:
          - {id: consumables_cache, qty: 12}
          - {id: eclss_habitat, qty: 4}
          - {id: habitat_module, qty: 4}
          - {id: radiation_shelter, qty: 2}
          - {id: robotic_maint_kit, qty: 6}
          - {id: thermal_control, qty: 4}
          - {id: dust_mitigation, qty: 2}
          - {id: optimus_robot, qty: 20}
          - {id: rover_unpressurized, qty: 4}
          - {id: cargo_crane, qty: 2}
          - {id: relay_ground_station, qty: 1}
          - {id: landing_beacons, qty: 2}
          - {id: central_compute, qty: 1}
          - {id: power_distribution, qty: 2}
          - {id: logistics_kit, qty: 2}

  # ------------------------------------------------------------------
  # City ramp (tasks B1-B3): fleet at least doubles per synod (the one
  # verified ramp anchor, New Space 2022); population milestones and
  # industrial-closure stages gate per data/city_ramp_seed.yaml; recurring
  # imports sized to the closure-keyed decay curve.
  # ------------------------------------------------------------------
