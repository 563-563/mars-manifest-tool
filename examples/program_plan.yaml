          - {id: robotic_maint_kit, qty: 12}
          - {id: cargo_crane, qty: 4}
          - {id: thermal_control, qty: 12}
          - {id: dust_mitigation, qty: 6}
          - {id: power_distribution, qty: 6}
          - {id: logistics_kit, qty: 6}
          - {id: relay_ground_station, qty: 2}
          - {id: central_compute, qty: 2}
          - {id: landing_beacons, qty: 2}

